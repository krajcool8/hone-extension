<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hone Settings</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 400px;
      margin: 40px auto;
      padding: 0 16px;
      color: #1a1a1a;
    }
    h1 { font-size: 1.2rem; margin-bottom: 24px; }
    label { display: block; font-size: 0.9rem; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 8px 10px;
      font-size: 0.9rem;
      border: 1px solid #ccc;
      border-radius: 4px;
      box-sizing: border-box;
    }
    button {
      margin-top: 12px;
      padding: 8px 16px;
      font-size: 0.9rem;
      background: #1a1a1a;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #333; }
    #status-msg {
      margin-top: 10px;
      font-size: 0.85rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Hone Settings</h1>
  <label for="api-key-input">Anthropic API key</label>
  <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
  <button id="save-btn">Save</button>
  <p id="status-msg"></p>
  <script src="options.js"></script>
</body>
</html>
